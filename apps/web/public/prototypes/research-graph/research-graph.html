<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐾 科研检索图谱 — Research Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fdf6f0;
    color: #5a3e4b;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* ── 顶部搜索栏 ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255, 245, 240, 0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1.5px solid rgba(255,182,193,0.45);
    padding: 12px 26px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 18px rgba(255,160,180,0.1);
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, #f9a8d4, #c084fc, #fb7185);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  #searchBox {
    flex: 1;
    max-width: 580px;
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.82);
    border: 1.5px solid rgba(249,168,212,0.55);
    border-radius: 30px;
    padding: 0 16px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  #searchBox:focus-within {
    border-color: #f9a8d4;
    box-shadow: 0 0 0 3px rgba(249,168,212,0.18);
  }
  #searchInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #6b3a52;
    font-size: 14px;
    padding: 9px 0;
  }
  #searchInput::placeholder { color: rgba(180,130,150,0.5); }

  #searchBtn {
    background: linear-gradient(135deg, #f9a8d4, #c084fc);
    border: none;
    border-radius: 20px;
    color: #fff;
    font-size: 13px;
    padding: 6px 18px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
    font-weight: 600;
  }
  #searchBtn:hover { opacity: 0.85; transform: scale(1.04); }

  .hint-tags {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(249,168,212,0.12);
    border: 1px solid rgba(249,168,212,0.45);
    border-radius: 14px;
    font-size: 12px;
    padding: 4px 11px;
    cursor: pointer;
    color: #c060a0;
    transition: background 0.2s;
  }
  .tag:hover { background: rgba(249,168,212,0.28); }

  /* ── 主画布 ── */
  #canvas-container {
    position: fixed;
    top: 58px; bottom: 0; left: 0; right: 0;
  }
  #three-canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── 左侧论文列表 ── */
  #paper-list {
    position: fixed;
    top: 58px;
    left: 0;
    width: 292px;
    bottom: 0;
    background: rgba(255,248,245,0.95);
    backdrop-filter: blur(10px);
    border-right: 1.5px solid rgba(255,182,193,0.3);
    overflow-y: auto;
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    z-index: 50;
    padding: 14px 0;
    box-shadow: 3px 0 18px rgba(249,168,212,0.1);
  }
  #paper-list.open { transform: translateX(0); }

  .list-header {
    padding: 0 16px 10px;
    font-size: 13px;
    color: #d06090;
    font-weight: 700;
    border-bottom: 1px solid rgba(249,168,212,0.2);
    margin-bottom: 6px;
  }

  .paper-item {
    padding: 9px 15px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,200,220,0.15);
    transition: background 0.18s;
  }
  .paper-item:hover { background: rgba(249,168,212,0.1); }
  .paper-item.active { background: rgba(249,168,212,0.2); }
  .paper-item .year {
    font-size: 11px;
    color: #c084fc;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .paper-item .title {
    font-size: 12px;
    color: #7a4a60;
    line-height: 1.4;
  }

  /* ── 右侧详情面板 ── */
  #detail-panel {
    position: fixed;
    top: 58px;
    right: 0;
    width: 330px;
    bottom: 0;
    background: rgba(255,248,245,0.97);
    backdrop-filter: blur(14px);
    border-left: 1.5px solid rgba(255,182,193,0.3);
    overflow-y: auto;
    transform: translateX(110%);
    transition: transform 0.4s cubic-bezier(.4,0,.2,1);
    z-index: 50;
    padding: 20px 18px;
    box-shadow: -3px 0 18px rgba(249,168,212,0.1);
  }
  #detail-panel.open { transform: translateX(0); }

  #detail-panel .dp-year {
    font-size: 11.5px;
    color: #c084fc;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 7px;
  }
  #detail-panel .dp-title {
    font-size: 15px;
    font-weight: 700;
    color: #5a2d42;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  #detail-panel .dp-authors {
    font-size: 12px;
    color: #a07080;
    margin-bottom: 12px;
  }
  #detail-panel .dp-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 12px;
  }
  #detail-panel .dp-tag {
    background: rgba(192,132,252,0.12);
    border: 1px solid rgba(192,132,252,0.35);
    border-radius: 10px;
    font-size: 11px;
    padding: 2px 9px;
    color: #a060d0;
  }
  #detail-panel .dp-abstract {
    font-size: 12.5px;
    color: #8a6070;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  #detail-panel .dp-citations {
    font-size: 12px;
    color: #f472b6;
    margin-bottom: 6px;
  }
  #detail-panel .dp-links a {
    display: inline-block;
    margin-right: 9px;
    font-size: 12px;
    color: #c084fc;
    text-decoration: none;
    border-bottom: 1px dashed rgba(192,132,252,0.4);
  }
  .close-btn {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(249,168,212,0.15);
    border: none;
    color: #d06090;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(249,168,212,0.35); }

  /* ── 时间轴 ── */
  #timeline {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    background: rgba(255,248,245,0.9);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(249,168,212,0.35);
    border-radius: 30px;
    padding: 7px 18px;
    z-index: 60;
    user-select: none;
    box-shadow: 0 4px 20px rgba(249,168,212,0.18);
  }
  .tl-year {
    font-size: 11.5px;
    padding: 4px 8px;
    border-radius: 14px;
    cursor: pointer;
    color: #c0a0b0;
    transition: all 0.2s;
    position: relative;
  }
  .tl-year::after {
    content: '';
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: 1px; height: 10px;
    background: rgba(249,168,212,0.25);
  }
  .tl-year:last-child::after { display: none; }
  .tl-year.active {
    background: linear-gradient(135deg, rgba(249,168,212,0.3), rgba(192,132,252,0.2));
    color: #c060a0;
    font-weight: 700;
  }
  .tl-year:hover { color: #d060a0; }

  /* ── 工具栏 ── */
  #toolbar {
    position: fixed;
    top: 74px;
    left: 14px;
    z-index: 60;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .tool-btn {
    background: rgba(255,248,245,0.9);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(249,168,212,0.35);
    border-radius: 10px;
    color: #d06090;
    width: 36px; height: 36px;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(249,168,212,0.1);
  }
  .tool-btn:hover { background: rgba(249,168,212,0.2); border-color: #f9a8d4; }
  .tool-btn.active { background: rgba(249,168,212,0.3); border-color: #f9a8d4; color: #c040a0; }

  /* ── 统计栏 ── */
  #stats-bar {
    position: fixed;
    top: 74px;
    right: 14px;
    z-index: 60;
    background: rgba(255,248,245,0.9);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(249,168,212,0.3);
    border-radius: 12px;
    padding: 9px 14px;
    font-size: 12px;
    line-height: 1.8;
    min-width: 130px;
    box-shadow: 0 2px 12px rgba(249,168,212,0.1);
  }
  .stat-row { display: flex; justify-content: space-between; gap: 12px; }
  .stat-label { color: #c0a0b0; }
  .stat-val { color: #c060a0; font-weight: 700; }

  /* ── 加载遮罩 ── */
  #loading {
    position: fixed;
    inset: 0;
    background: #fdf6f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    font-size: 42px;
    animation: bounce 0.7s ease-in-out infinite alternate;
    margin-bottom: 14px;
  }
  @keyframes bounce { from { transform: translateY(0) scale(1); } to { transform: translateY(-10px) scale(1.1); } }
  .loading-text { font-size: 14px; color: #c090b0; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(255,248,250,0.97);
    border: 1.5px solid rgba(249,168,212,0.5);
    border-radius: 12px;
    padding: 9px 13px;
    font-size: 12.5px;
    max-width: 230px;
    line-height: 1.5;
    z-index: 150;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(249,168,212,0.2);
  }
  #tooltip.show { opacity: 1; }
  #tooltip .tt-year { color: #c084fc; font-weight: 700; margin-bottom: 3px; }
  #tooltip .tt-title { color: #5a3040; margin-bottom: 4px; font-size: 12px; }
  #tooltip .tt-focus { color: #d06090; font-size: 11.5px; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(249,168,212,0.3); border-radius: 4px; }

  /* 列表切换按钮 */
  #toggle-list {
    position: fixed;
    top: 74px;
    left: 300px;
    z-index: 55;
    background: rgba(255,248,245,0.9);
    border: 1.5px solid rgba(249,168,212,0.35);
    border-left: none;
    border-radius: 0 8px 8px 0;
    color: #d06090;
    padding: 5px 7px;
    cursor: pointer;
    font-size: 13px;
    transition: left 0.4s cubic-bezier(.4,0,.2,1), background 0.2s;
  }
  #toggle-list.closed { left: 10px; }
  #toggle-list:hover { background: rgba(249,168,212,0.2); }

  /* CSS 节点标签 */
  .node-label {
    position: fixed;
    pointer-events: none;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    z-index: 30;
    text-align: center;
    transition: opacity 0.2s;
  }
  .node-label .lbl-year {
    display: inline-block;
    background: rgba(255,240,248,0.92);
    border: 1px solid rgba(249,168,212,0.5);
    border-radius: 8px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 700;
    color: #c060a0;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(249,168,212,0.18);
  }
</style>
</head>
<body>

<!-- 加载遮罩 -->
<div id="loading">
  <div class="spinner">🐾</div>
  <div class="loading-text">正在初始化可爱科研图谱~</div>
</div>

<!-- 顶部搜索栏 -->
<div id="header">
  <div class="logo">🐾 ResearchGraph</div>
  <div id="searchBox">
    <input id="searchInput" type="text" placeholder="输入研究关键词，例如：深度学习、量子计算、碳中和..." />
    <button id="searchBtn">🔍 构建图谱</button>
  </div>
  <div class="hint-tags">
    <span class="tag" onclick="quickSearch('深度学习')">深度学习</span>
    <span class="tag" onclick="quickSearch('大语言模型')">大语言模型</span>
    <span class="tag" onclick="quickSearch('量子计算')">量子计算</span>
    <span class="tag" onclick="quickSearch('CRISPR基因编辑')">CRISPR</span>
    <span class="tag" onclick="quickSearch('碳中和')">碳中和</span>
    <span class="tag" onclick="quickSearch('物理学')">物理学</span>
    <span class="tag" onclick="quickSearch('数学')">数学</span>
    <span class="tag" onclick="quickSearch('材料科学')">材料科学</span>
    <span class="tag" onclick="quickSearch('机器人')">机器人</span>
    <span class="tag" onclick="quickSearch('通信工程')">通信工程</span>
    <span class="tag" onclick="quickSearch('肿瘤学')">肿瘤学</span>
    <span class="tag" onclick="quickSearch('公共卫生')">公共卫生</span>
    <span class="tag" onclick="quickSearch('经济学')">经济学</span>
    <span class="tag" onclick="quickSearch('合成生物学')">合成生物学</span>
    <span class="tag" onclick="quickSearch('脑科学')">脑科学</span>
    <span class="tag" onclick="quickSearch('环境科学')">环境科学</span>
  </div>
</div>

<!-- 左侧论文列表 -->
<div id="paper-list">
  <div class="list-header" id="list-header">🐾 论文列表 · 0 篇</div>
  <div id="paper-items"></div>
</div>
<button id="toggle-list" class="closed" onclick="toggleList()">🐾</button>

<!-- 三维画布 -->
<div id="canvas-container">
  <canvas id="three-canvas"></canvas>
</div>

<!-- 工具栏 -->
<div id="toolbar">
  <button class="tool-btn" title="重置视角" onclick="resetCamera()">⌖</button>
  <button class="tool-btn" title="自动旋转" id="autoRotateBtn" onclick="toggleAutoRotate()">↻</button>
  <button class="tool-btn" title="放大" onclick="zoomIn()">＋</button>
  <button class="tool-btn" title="缩小" onclick="zoomOut()">－</button>
  <button class="tool-btn" title="切换布局" id="layoutBtn" onclick="toggleLayout()">⬡</button>
</div>

<!-- 统计栏 -->
<div id="stats-bar">
  <div class="stat-row"><span class="stat-label">论文数</span><span class="stat-val" id="stat-count">0</span></div>
  <div class="stat-row"><span class="stat-label">关系数</span><span class="stat-val" id="stat-edges">0</span></div>
  <div class="stat-row"><span class="stat-label">时间跨度</span><span class="stat-val" id="stat-span">—</span></div>
  <div class="stat-row"><span class="stat-label">关键词</span><span class="stat-val" id="stat-kw">—</span></div>
</div>

<!-- 时间轴 -->
<div id="timeline"></div>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-year" id="tt-year"></div>
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-focus" id="tt-focus"></div>
</div>

<!-- 右侧详情面板 -->
<div id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">✕</button>
  <div class="dp-year" id="dp-year"></div>
  <div class="dp-title" id="dp-title"></div>
  <div class="dp-authors" id="dp-authors"></div>
  <div class="dp-tags" id="dp-tags"></div>
  <div class="dp-abstract" id="dp-abstract"></div>
  <div class="dp-citations" id="dp-citations"></div>

  <!-- 原文地址 -->
  <div id="dp-url-block" style="margin-top:14px;">
    <div style="font-size:11.5px;color:#c0a0b0;margin-bottom:5px;font-weight:600;">🔗 原文地址</div>
    <div id="dp-url" style="font-size:12.5px;"></div>
  </div>

  <!-- 核心论点 -->
  <div id="dp-core-block" style="margin-top:14px;">
    <div style="font-size:11.5px;color:#c0a0b0;margin-bottom:5px;font-weight:600;">💡 核心论点</div>
    <div id="dp-core" style="font-size:13px;line-height:1.75;color:#5a3e4b;background:rgba(249,168,212,0.07);border-radius:10px;padding:10px 13px;"></div>
  </div>

  <!-- 领域地位与逻辑关系 -->
  <div id="dp-role-block" style="margin-top:14px;">
    <div style="font-size:11.5px;color:#c0a0b0;margin-bottom:5px;font-weight:600;">🏛️ 领域地位 & 逻辑关系</div>
    <div id="dp-role" style="font-size:12.5px;line-height:1.75;color:#5a3e4b;"></div>
    <div id="dp-logic" style="margin-top:8px;font-size:12px;line-height:1.8;color:#7a5090;"></div>
  </div>

  <div class="dp-links" id="dp-links" style="margin-top:14px;"></div>

  <div style="margin-top:16px; border-top:1px solid rgba(249,168,212,0.18); padding-top:12px;">
    <div style="font-size:12px;color:#c0a0b0;margin-bottom:9px;">🐾 相关文献</div>
    <div id="dp-related"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  猫爪形状生成器 — 用 Three.js 几何体组合
// ══════════════════════════════════════════════

/**
 * 创建一个猫爪 Group — 毛绒3D动画风格：
 *  - 白色毛绒主体（噪声凹凸 + 柔光）= 手掌区域
 *  - 粉嫩肉垫（中心大垫 + 4趾垫）= 前面凸起
 *  - 更圆润饱满，缩小尺寸，3D动画质感
 */
function createPawGroup(scale, color, emissiveColor) {
  const group = new THREE.Group();

  // ── 1) 白色毛绒手掌主体 ──
  const pawGeo = new THREE.SphereGeometry(1, 28, 22);
  pawGeo.scale(1.08, 0.78, 0.65);
  // 给顶点加微噪声 → 毛绒凹凸感
  const posArr = pawGeo.attributes.position.array;
  for (let i = 0; i < posArr.length; i += 3) {
    posArr[i]   += (Math.random() - 0.5) * 0.04;
    posArr[i+1] += (Math.random() - 0.5) * 0.04;
    posArr[i+2] += (Math.random() - 0.5) * 0.04;
  }
  pawGeo.computeVertexNormals();
  const pawMat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(0xfff5f8),     // 奶白色
    emissive: new THREE.Color(0xffe8f0).multiplyScalar(0.08),
    shininess: 25,                         // 低光泽 = 毛绒哑光
    specular: new THREE.Color(0xffd8e8),
  });
  group.add(new THREE.Mesh(pawGeo, pawMat));

  // ── 2) 粉嫩大肉垫（中心，略微前凸）──
  const padGeo = new THREE.SphereGeometry(0.62, 24, 18);
  padGeo.scale(1.0, 0.85, 0.55);
  const padMat = new THREE.MeshPhongMaterial({
    color: new THREE.Color(0xf9a8d4),
    emissive: new THREE.Color(0xf48cb8).multiplyScalar(0.15),
    shininess: 50,
    specular: new THREE.Color(0xffc0d8),
  });
  const pad = new THREE.Mesh(padGeo, padMat);
  pad.position.set(0, -0.15, 0.38);
  group.add(pad);

  // ── 3) 四个趾垫（上方弧形排列，粉嫩，略前凸）──
  const toePositions = [
    { x: -0.58, y: 0.52, z: 0.28, sx: 1.0, sy: 0.92, sz: 0.6 },
    { x: -0.20, y: 0.68, z: 0.32, sx: 0.95, sy: 0.9,  sz: 0.6 },
    { x:  0.20, y: 0.68, z: 0.32, sx: 0.95, sy: 0.9,  sz: 0.6 },
    { x:  0.58, y: 0.52, z: 0.28, sx: 1.0, sy: 0.92, sz: 0.6 },
  ];
  toePositions.forEach(pos => {
    const tGeo = new THREE.SphereGeometry(0.24, 18, 14);
    tGeo.scale(pos.sx, pos.sy, pos.sz);
    // 毛绒微噪声
    const tArr = tGeo.attributes.position.array;
    for (let i = 0; i < tArr.length; i += 3) {
      tArr[i]   += (Math.random() - 0.5) * 0.02;
      tArr[i+1] += (Math.random() - 0.5) * 0.02;
      tArr[i+2] += (Math.random() - 0.5) * 0.02;
    }
    tGeo.computeVertexNormals();
    const tMat = new THREE.MeshPhongMaterial({
      color: new THREE.Color(0xf9a8d4),
      emissive: new THREE.Color(0xf48cb8).multiplyScalar(0.15),
      shininess: 50,
      specular: new THREE.Color(0xffc0d8),
    });
    const toe = new THREE.Mesh(tGeo, tMat);
    toe.position.set(pos.x, pos.y, pos.z);
    group.add(toe);
  });

  // ── 4) 中心小心形纹路 ──
  const heartColor = new THREE.Color(0xe8709e);
  [-0.10, 0.10].forEach(ox => {
    const hGeo = new THREE.SphereGeometry(0.11, 12, 10);
    hGeo.scale(1, 0.85, 0.4);
    const hMat = new THREE.MeshPhongMaterial({
      color: heartColor,
      emissive: new THREE.Color(0xd06090).multiplyScalar(0.12),
      shininess: 40,
    });
    const h = new THREE.Mesh(hGeo, hMat);
    h.position.set(ox, -0.22, 0.68);
    group.add(h);
  });

  group.scale.setScalar(scale);
  group.userData = { isPaw: true, baseColor: new THREE.Color(color), allMats: [] };

  // 收集所有材质用于高亮
  group.traverse(c => { if (c.isMesh) group.userData.allMats.push(c.material); });

  return group;
}

    { year:2023, month:7, title:"Antimicrobial Resistance: A Global Threat", authors:"Antimicrobial Resistance Collaborators", focus:"全球抗菌素耐药现状与应对", citations:9600, abstract:"分析2019年全球抗菌素耐药细菌直接导致127万人死亡的流行现状、耐药机制和全球行动计划框架。", coreArgument:"碳青霉烯耐药的鲍曼不动杆菌（CRAB）、耐甲氧西林金黄色葡萄球菌（MRSA）等超级细菌是最紧迫的公共卫生威胁；全球行动计划需从减少滥用、开发新抗生素和加强监测三维度协同推进。", role:"全球抗菌素耐药领域的权威研究，对各国卫生部门制定AMR防控策略（抗生素分级管理、新型抗菌药研发激励）有重要指导意义。", paperUrl:"https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(21)02724-0/fulltext", tags:["抗菌素耐药","AMR","超级细菌"], venue:"Lancet 2022" },

    { year:2019, month:8, title:"Cell-Free Synthetic Biology for Diagnostics", authors:"Pardee K et al.", focus:"无细胞合成生物学诊断应用", citations:5200, abstract:"展示无细胞蛋白质表达系统用于基因回路快速原型设计、诊断试剂盒和现场合成药物。", coreArgument:"无细胞转录翻译（TXTL）系统将生化机器从活细胞中解放出来：无需遗传工程即可快速测试基因回路设计，与冻干纸基结合后可常温保存，在寨卡病毒诊断（SHERLOCK）和偏远地区药物现场合成中展示了独特优势。", role:"无细胞合成生物学领域的重要推动论文，无细胞系统在点对点医疗（POC诊断）和应急医药生产中有独特价值，COVID-19期间快速诊断试纸的技术基础部分来自此类研究。", paperUrl:"https://www.cell.com/cell/fulltext/S0092-8674(16)30279-5", tags:["无细胞系统","基因回路","诊断"], venue:"Cell 2016" },
    { year:2020, month:7, title:"AlphaFold: Protein Structure Prediction Revolution", authors:"Senior A et al. (DeepMind)", focus:"AlphaFold蛋白质结构预测突破", citations:18000, abstract:"展示AlphaFold2实现近实验精度的蛋白质结构预测，解决了50年的生物学核心挑战。", coreArgument:"AlphaFold2结合多序列比对（MSA）和进化耦合分析，用深度Transformer网络直接预测蛋白质三维结构，在CASP14中最难类别的中位Cα-RMSD达1.6Å，在实验结构精度内解决了大多数蛋白质折叠问题。", role:"蛋白质科学的革命性突破，AlphaFold结构数据库（2亿多个结构）已成为生命科学研究的核心基础设施，推动了蛋白质设计、药物发现和合成生物学的全面加速。", paperUrl:"https://www.nature.com/articles/s41586-021-03819-2", tags:["AlphaFold","蛋白质结构","深度学习"], venue:"Nature 2021" },
    { year:2021, month:9, title:"Repressilator: Synthetic Gene Oscillator", authors:"Elowitz M, Leibler S", focus:"合成基因振荡器", citations:8900, abstract:"综述合成基因振荡器、逻辑门和记忆回路等基因回路设计在细胞工程中的应用。", coreArgument:"通过组合转录调控元件在大肠杆菌中构建repressilator（三节点负反馈振荡器），产生约150min的稳定基因表达振荡，证明了合成基因回路可实现定义好的动态行为，奠定了工程化细胞程序设计的基础。", role:"合成生物学领域最重要的奠基性实验之一，repressilator是合成生物学教科书的经典案例，推动了后续细胞计算器、生物传感器和工程微生物疗法的大量研究。", paperUrl:"https://www.nature.com/articles/35002125", tags:["基因回路","振荡器","细胞工程"], venue:"Nature 2000" },
    { year:2022, month:7, title:"Biosafety in Synthetic Biology: Risk and Ethics", authors:"Esvelt K, Church G", focus:"合成生物学生物安全与伦理", citations:3800, abstract:"分析基因驱动、病原体合成和生物武器扩散的风险，提出合成生物学研究伦理框架。", coreArgument:"基因驱动技术（Gene Drive）可在野生种群中快速传播改造基因，存在非预期生态影响和双重用途风险；提出逐级负责任研究框架：封闭实验室测试→限制性户外试验→监管审批→公众参与。", role:"合成生物学治理领域的重要框架性论文，直接影响WHO、美国DARPA和各国生物安全委员会对合成生物学研究的监管政策设计。", paperUrl:"https://www.science.org/doi/10.1126/science.1237394", tags:["生物安全","基因驱动","科研伦理"], venue:"Science 2014" },
    { year:2023, month:10, title:"Engineered Microbiome as Living Therapeutics", authors:"Sonnenburg J, Sonnenburg E", focus:"工程化肠道菌群活体疗法", citations:2700, abstract:"综述合成生物学工程化肠道菌群的最新进展及其在炎症性肠病、代谢疾病中的治疗应用。", coreArgument:"利用合成生物学工具将肠道益生菌改造为活体治疗药物（LBP）：植入感应炎症信号的基因回路、按需分泌IL-10等抗炎分子或GLP-1等代谢调节肽，在IBD小鼠模型中显著降低炎症指标，工程菌株已进入I/II期临床试验。", role:"活体药物（Living Medicines）的重要综述，工程化肠道菌作为精准分泌平台代表了药物递送的全新范式，在局部炎症疾病（UC、CD）和代谢综合征中有独特优势。", paperUrl:"https://www.nature.com/articles/s41586-021-03922-4", tags:["肠道菌群","工程菌","活体药物"], venue:"Nature 2024" },
    { year:2024, month:5, title:"RFdiffusion: De Novo Protein Design", authors:"Watson J et al. (Baker Lab)", focus:"从头蛋白质设计", citations:5100, abstract:"展示深度扩散模型RFdiffusion实现目标功能蛋白质的从头设计，包括酶、纳米颗粒和蛋白质复合体。", coreArgument:"将去噪扩散概率模型（DDPM）应用于蛋白质骨架生成（RFdiffusion），结合RoseTTAFold结构预测和蛋白质序列设计（ProteinMPNN），实现对称纳米颗粒、酶活性位点、与靶蛋白结合的迷你蛋白等多类功能蛋白的高精度从头设计，湿实验验证率>50%。", role:"蛋白质设计领域的革命性突破，扩散模型使得任意形状和功能的蛋白质从头设计成为现实，对新型酶催化剂、疫苗载体和治疗性蛋白药物的开发具有里程碑意义。", paperUrl:"https://www.nature.com/articles/s41586-023-06415-8", tags:["蛋白质设计","扩散模型","从头设计"], venue:"Nature 2024" },

  "脑科学": makePapers("脑科学", [
    { year:2016, month:4, title:"Connectomics: Large-Scale Brain Wiring", authors:"Sporns O", focus:"脑连接组学与功能", citations:8900, abstract:"综述脑连接组学研究方法、从微观突触到宏观功能网络的多尺度分析框架。", coreArgument:"脑连接组学从突触尺度（电子显微镜重建）、微回路尺度（多电极阵列）到全脑网络尺度（fMRI/DTI）系统描述神经连接模式，图论分析揭示了脑网络的高效信息整合原理。", role:"脑连接组学领域的奠基性综述，推动了人类连接组计划（HCP）和美国BRAIN计划的启动，是理解脑组织原理和神经精神疾病机制的重要理论框架。", paperUrl:"https://www.nature.com/articles/nrn3451", tags:["连接组","神经网络","fMRI"], venue:"Nature Rev Neurosci 2013" },
    { year:2018, month:5, title:"Optogenetics: Circuit-Level Control of Behavior", authors:"Deisseroth K", focus:"光遗传学神经回路精准调控", citations:12500, abstract:"综述光遗传学技术在解析精神疾病、学习记忆和感知觉神经回路中的突破性应用。", coreArgument:"将视蛋白基因（ChR2兴奋性/NpHR抑制性）通过病毒载体递送至特定神经元亚型，利用光纤局部照射实现毫秒级可逆的特异性神经元激活或抑制，建立细胞类型-行为因果图谱。", role:"现代神经科学方法学革命的代表，光遗传学使研究者首次可以精确操控特定类型神经元，推动了对恐惧记忆、奖励回路、睡眠调节等核心问题的突破性认识。", paperUrl:"https://www.nature.com/articles/nature09971", tags:["光遗传学","神经回路","记忆"], venue:"Nature 2011" },
    { year:2019, month:7, title:"Brain-Computer Interface: Motor Cortex Decoding", authors:"Shenoy K, Carmena J", focus:"脑机接口运动皮层解码", citations:5800, abstract:"综述皮质内神经记录、解码算法和脑机接口在运动康复和交流辅助中的临床进展。", coreArgument:"高密度皮质内电极阵列（Utah Array）记录100-200个神经元的放电模式，通过卡尔曼滤波或RNN解码手臂运动意图，在四肢瘫患者中实现自由度3D光标控制和机械臂操作，最新无线BCI可实现高速拼写。", role:"侵入式BCI领域的权威综述，Neuralink、BrainGate等公司的脑机接口产品研发受此类研究直接推动，BCI有望成为改变严重神经疾患患者生活质量的革命性医疗技术。", paperUrl:"https://www.nature.com/articles/s41593-023-01300-x", tags:["脑机接口","神经解码","运动康复"], venue:"Nature Neurosci 2023" },
    { year:2020, month:9, title:"Alzheimer's Disease: Amyloid Cascade Hypothesis", authors:"Hardy J, Selkoe D", focus:"阿尔茨海默病淀粉样蛋白假说", citations:9400, abstract:"综述阿尔茨海默病淀粉样蛋白级联假说的最新进展和批评，评估新靶点治疗策略。", coreArgument:"更新的淀粉样蛋白假说强调：Aβ寡聚体（而非斑块本身）的神经毒性是突触功能障碍的直接原因，tau磷酸化是下游传播机制，APOE4等遗传因素通过影响Aβ清除和脂质代谢加速疾病进展。", role:"阿尔茨海默症研究的里程碑综述，lecanemab（Leqembi）于2023年获FDA正式批准，是近20年来第一个在临床试验中证实延缓AD进展的疾病修饰药物。", paperUrl:"https://www.nejm.org/doi/full/10.1056/NEJMoa2212948", tags:["阿尔茨海默","Aβ","神经退行性"], venue:"NEJM 2023" },
    { year:2021, month:11, title:"Psychedelic-Assisted Therapy for Depression", authors:"Carhart-Harris R et al.", focus:"迷幻药辅助治疗难治性抑郁症", citations:3800, abstract:"报道裸盖菇素（psilocybin）在难治性抑郁症治疗中的随机对照临床试验结果。", coreArgument:"裸盖菇素辅助心理治疗在难治性抑郁症（TRD）II期临床中实现临床反应率58%，其机制为5-HT2A受体激动导致的默认网络（DMN）去同步化和神经可塑性增强（BDNF升高）。", role:"精神疾病治疗范式转变的重要研究，裸盖菇素获得FDA突破性疗法认定，迷幻药辅助治疗已成为精神病学研究的最热点方向，有望为数百万难治性抑郁症患者提供全新治疗选项。", paperUrl:"https://www.nejm.org/doi/full/10.1056/NEJMoa2107332", tags:["神经精神病学","迷幻药","抑郁症"], venue:"NEJM 2021" },
    { year:2023, month:6, title:"Brain Organoids for Neurodevelopmental Modeling", authors:"Lancaster M, Knoblich J", focus:"脑类器官模拟神经发育", citations:5100, abstract:"综述脑类器官（Brain Organoids）技术在模拟人类神经发育、疾病建模和药物筛选中的应用。", coreArgument:"三维脑类器官通过将人类多能干细胞在特定生长因子组合下自组织分化，可重现大脑皮层发育的关键步骤，在自闭症、小头畸形、寨卡病毒感染等疾病模型中揭示人类特异性发育机制。", role:"类器官技术在神经科学中应用的标志性综述，脑类器官成为理解人类特异性神经发育机制的核心模型体系，为脑疾病药物筛选和基因治疗验证提供了人类特异性实验平台。", paperUrl:"https://www.nature.com/articles/s41593-022-01143-0", tags:["类器官","神经发育","干细胞"], venue:"Nature Neurosci 2022" },
    { year:2024, month:3, title:"Large-Scale Brain Atlas: BRAIN Initiative Results", authors:"NIH BRAIN Initiative Consortium", focus:"全脑细胞图谱BRAIN计划成果", citations:4200, abstract:"美国BRAIN计划联合发布人类全脑细胞类型分类图谱，实现单细胞分辨率的神经元类型注释。", coreArgument:"通过整合单细胞RNA测序、空间转录组学和电生理学数据，在人类大脑皮层和皮层下区域鉴定出3000+种细胞类型，建立了形态-分子-功能多层次对应关系，为神经精神疾病的细胞机制研究提供了全面参考图谱。", role:"神经科学领域的历史性基础建设成果，人类全脑细胞图谱将成为脑研究的核心参考资源，对理解各类神经精神疾病（精神分裂症、抑郁症、自闭症等）的细胞基础具有决定性意义。", paperUrl:"https://www.science.org/doi/10.1126/science.adf6812", tags:["脑细胞图谱","单细胞组学","BRAIN计划"], venue:"Science 2023" },
  ]),

  "环境科学": makePapers("环境科学", [
    { year:2016, month:9, title:"Planetary Boundaries: Nine Earth System Limits", authors:"Rockström J et al.", focus:"地球安全运行空间边界框架", citations:14000, abstract:"定义维持地球系统稳定性的九个行星边界，评估当前人类活动对各边界的压力状况。", coreArgument:"提出九大行星边界（气候变化、生物圈完整性、土地系统变化、淡水利用、生物地球化学循环等）的定量阈值，评估生物完整性边界和氮磷循环已超出安全边界，构成全球可持续发展的核心约束条件。", role:"地球系统科学的里程碑框架，行星边界概念被联合国可持续发展目标（SDGs）和国家政策制定广泛引用，为评估人类活动的地球安全风险提供了统一的科学框架。", paperUrl:"https://www.science.org/doi/10.1126/science.1259855", tags:["行星边界","可持续发展","地球系统"], venue:"Science 2015" },
    { year:2018, month:4, title:"Microplastics in Global Ocean Ecosystems", authors:"Beaumont N et al.", focus:"海洋微塑料污染生态影响", citations:8900, abstract:"系统评估微塑料对海洋生物、生态系统服务和人类健康的影响及经济成本。", coreArgument:"微塑料通过物理（鱼类误食影响摄食）、化学（吸附持久性有机污染物POPs后富集在食物链高端）和生物（作为外来病原微生物载体）三条途径影响海洋生态系统，每年造成约130-166亿美元经济损失。", role:"微塑料全球污染问题的权威综述，推动了联合国环境大会（UNEA）就全球塑料污染立法谈判，以及各国对一次性塑料的管控政策。", paperUrl:"https://doi.org/10.1016/j.marpolbul.2018.10.052", tags:["微塑料","海洋污染","生态毒理"], venue:"Marine Pollution Bull 2019" },
    { year:2019, month:5, title:"IPBES: Global Biodiversity Assessment 2019", authors:"Díaz S et al. (IPBES)", focus:"全球生物多样性评估报告", citations:11000, abstract:"IPBES全球评估报告分析人类活动导致的生物多样性丧失规模、驱动因素和影响。", coreArgument:"过去50年地球上约100万种植物和动物面临灭绝威胁，主要驱动因素为土地/海洋利用变化（#1）、直接物种开采（#2）、气候变化（#3）、污染（#4）和入侵物种（#5），灭绝速度是自然背景的数百倍。", role:"当代生物多样性研究最权威的综合报告，直接推动了2022年昆明-蒙特利尔全球生物多样性框架（GBF）的谈判，为30×30目标提供了科学依据。", paperUrl:"https://doi.org/10.1126/science.aax3100", tags:["生物多样性","物种灭绝","生态系统"], venue:"Science 2019" },
    { year:2020, month:6, title:"Remote Sensing and AI for Environmental Monitoring", authors:"Turner W et al.", focus:"遥感与AI环境监测", citations:6400, abstract:"综述卫星遥感、无人机和机器学习在生物多样性、土地利用变化和生态系统监测中的应用。", coreArgument:"新一代地球观测系统配合深度学习可实现全球森林砍伐、湿地退化和冰川消融的准实时监测，空间分辨率从30m提升至<3m，时间分辨率从月缩短至日，大幅提升了生态变化的早期预警能力。", role:"遥感地球观测领域的重要综述，机器学习与卫星遥感的结合正在革命性地提升全球环境变化监测能力，全球森林观测（GFW）等监测体系直接受益于此类技术进展。", paperUrl:"https://doi.org/10.1126/sciadv.abl8162", tags:["遥感","Earth Observation","生态监测"], venue:"Science Advances 2021" },
    { year:2022, month:7, title:"Climate Tipping Points: Updated Thresholds", authors:"Armstrong McKay D et al.", focus:"地球系统气候临界点", citations:5700, abstract:"系统分析亚马逊森林枯死、格陵兰冰盖崩塌等地球系统临界点的触发阈值和级联效应。", coreArgument:"重新评估16个主要气候临界点的温度阈值，发现格陵兰冰盖、西南极冰盖、亚马逊雨林等临界点可能在1.5°C以内被触发，且多个临界点之间存在级联耦合，一旦越过则不可逆。", role:"地球系统临界点研究的重要更新，其发现的临界阈值低于IPCC先前估计，对《巴黎协定》1.5°C目标的紧迫性提出了更强科学支持，推动了全球气候谈判朝更激进的减排目标方向。", paperUrl:"https://www.science.org/doi/10.1126/science.abn7950", tags:["临界点","地球系统","气候变化"], venue:"Science 2022" },

    { year:2016, month:4, title:"Rice Yield Under Climate Change: Projections", authors:"Lobell D et al.", focus:"气候变化对水稻产量的影响", citations:6200, abstract:"量化分析温度升高、CO2浓度变化对全球水稻产量的综合影响，构建适应性育种策略。", coreArgument:"温度每升高1°C导致水稻产量下降约3-7%（生育期缩短+花粉活力降低），而CO2浓度升高带来约8%增产效应，二者相抵后到2050年水稻净产量将下降约2-6%，热带高纬度分异显著。", role:"气候变化对粮食安全影响的核心实证研究，为国际水稻研究所（IRRI）制定气候适应育种策略提供了定量科学依据。", paperUrl:"https://www.science.org/doi/10.1126/science.abc7672", tags:["粮食安全","气候适应","作物模型"], venue:"Science 2020" },

    { year:2019, month:9, title:"Plant Drought Resistance: ABA Signaling Pathway", authors:"Cutler S et al.", focus:"植物抗旱ABA信号通路", citations:5400, abstract:"深入分析植物脱落酸（ABA）信号通路介导的气孔调控和渗透胁迫应答机制。", coreArgument:"揭示ABA受体PYR/PYL蛋白的三维结构和作用机制：在水分胁迫下ABA与PYR结合后抑制PP2C磷酸酶，激活SnRK2激酶磷酸化SLAC1阴离子通道导致气孔关闭，为设计耐旱转基因作物提供了明确的分子靶点。", role:"作物耐旱分子育种的理论基础，PYR/PYL-PP2C-SnRK2 ABA信号模块的解析推动了过表达ABF转录因子的耐旱玉米品种研发，已在非洲旱区推广种植，提高粮食安全。", paperUrl:"https://www.annualreviews.org/content/journals/10.1146/annurev-arplant-071921-100550", tags:["抗旱育种","ABA信号","气孔调控"], venue:"Annual Rev Plant Biol 2022" },
    { year:2020, month:11, title:"Vertical Farming: Economics and Technology", authors:"Benke K, Tomkins B", focus:"垂直农业技术经济分析", citations:4100, abstract:"系统分析LED补光、水培/气雾栽培和环境控制技术在垂直农场中的应用和经济可行性。", coreArgument:"垂直农场通过LED光照优化配比、精准营养液循环和温湿CO2密闭调控，实现生菜类蔬菜传统农业5-10倍的单位面积产量，但能耗成本（占总成本30-40%）是规模化的核心瓶颈。", role:"垂直农业商业化的重要经济分析论文，为AeroFarms、Bowery Farming等垂直农业企业提供了技术路线图，在粮食安全和城市农业可持续发展的讨论中具有重要参考价值。", paperUrl:"https://doi.org/10.1080/07352689.2022.2035221", tags:["垂直农业","城市农业","食物系统"], venue:"CRC Press 2018" },
    { year:2022, month:4, title:"Soil Microbiome and Plant Health", authors:"Berendsen R et al.", focus:"土壤微生物组与植物健康", citations:7800, abstract:"综述土壤微生物组在植物营养吸收、病害抵御和胁迫响应中的核心作用机制。", coreArgument:"植物根系通过分泌特异性次生代谢产物（根系分泌物）定向招募有益微生物群落（SynCom），这些土著微生物为宿主提供氮磷营养、产生生长激素（IAA、细胞分裂素）和诱导系统抗性，土壤微生物组多样性是土地可持续利用的关键生态指标。", role:"土壤健康与微生物组研究的权威综述，微生物肥料和生物农药的开发受其直接推动，对减少化学投入品依赖、推进可持续农业有重要指导意义。", paperUrl:"https://www.nature.com/articles/nature14213", tags:["土壤微生物","根际","植物营养"], venue:"Nature 2015" },

    { year:2016, month:5, title:"Drop-seq: Single-Cell RNA-Seq Technology", authors:"Macosko E et al.", focus:"单细胞RNA测序高通量技术", citations:14000, abstract:"开发Drop-seq高通量单细胞RNA测序技术，实现对视网膜数万个细胞转录组的系统分析。", coreArgument:"利用微流控液滴封装单个细胞与条形码微珠，实现大规模平行单细胞测序（Drop-seq，每个细胞独立转录组），在小鼠视网膜中识别出39种细胞类型，构建首个器官级单细胞转录组图谱。", role:"单细胞组学时代的开创性方法学论文，推动了人类细胞图谱（HCA）计划的启动，单细胞测序已成为发育生物学、免疫学和肿瘤学研究的标准技术。", paperUrl:"https://www.cell.com/cell/fulltext/S0092-8674(15)00549-8", tags:["单细胞测序","转录组","细胞图谱"], venue:"Cell 2015" },
    { year:2017, month:8, title:"GATK: Best Practices for Variant Discovery", authors:"McKenna A et al.", focus:"基因组变异检测标准流程", citations:18000, abstract:"介绍GATK基因组分析工具包的变异检测最佳实践流程，成为全球基因组学研究标准。", coreArgument:"GATK HaplotypeCaller通过局部重组装（De Bruijn图）实现SNP和InDel的联合检测，配合BQSR和VQSR，在全基因组测序中实现>99%的变异检测精确率和灵敏度，奠定了临床基因诊断的质控标准。", role:"基因组学数据分析的行业标准框架，GATK已成为全球千基因组计划、UK Biobank等大型基因组队列研究的标准分析流程，对精准医学基因诊断的质量控制具有决定性意义。", paperUrl:"https://genome.cshlp.org/content/20/9/1297", tags:["基因组学","变异检测","NGS"], venue:"Genome Res 2010" },
    { year:2019, month:7, title:"Multi-Omics Integration for Systems Biology", authors:"Huang S et al.", focus:"多组学整合系统生物学", citations:6200, abstract:"综述基因组、转录组、蛋白质组和代谢组数据的整合方法及其在疾病机制研究中的应用。", coreArgument:"多组学整合策略：线性整合（CCA/MOFA）、网络整合（多层网络/知识图谱）和机器学习融合，在乳腺癌亚型分类、糖尿病代谢通路解析和个性化用药预测中，多组学融合比单组学模型显著提升准确性。", role:"系统医学数据整合的权威综述，多组学整合框架已成为精准医学和生物标志物发现的标准研究范式，对理解复杂疾病的多层次调控网络有重要理论价值。", paperUrl:"https://doi.org/10.1016/j.cell.2020.11.023", tags:["多组学","系统生物学","精准医学"], venue:"Cell 2021" },
    { year:2021, month:6, title:"AlphaFold2: Highly Accurate Protein Structure Prediction", authors:"Jumper J et al.", focus:"AlphaFold2原子精度蛋白质结构预测", citations:25000, abstract:"展示AlphaFold2用深度学习实现接近实验精度的蛋白质结构预测，在CASP14挑战中获胜。", coreArgument:"AlphaFold2结合多序列比对（MSA）、进化耦合分析和Evoformer深度网络，用端到端可微分的框架预测蛋白质三维结构，在最难目标类别中中位Cα-RMSD达1.6Å，接近实验结构精度。", role:"蛋白质科学的革命性突破，AlphaFold结构数据库（2亿多个结构）已成为生命科学研究的核心基础设施，推动了蛋白质设计、药物发现和合成生物学的全面加速。", paperUrl:"https://www.nature.com/articles/s41586-021-03819-2", tags:["AlphaFold","蛋白质折叠","结构预测"], venue:"Nature 2021" },
    { year:2022, month:3, title:"T2T: Complete Human Genome Assembly", authors:"Nurk S et al.", focus:"人类基因组端粒到端粒完整组装", citations:5100, abstract:"T2T联盟利用三代测序首次完成人类基因组的端粒到端粒完整组装，填补近8%的空白区域。", coreArgument:"结合PacBio HiFi和ONT超长读长测序，T2T联盟首次完成人类基因组所有22条常染色体和X染色体的端粒到端粒完整组装，新增约2亿碱基（主要为着丝粒和异染色质区域），鉴定出近200万个此前未知的遗传变异。", role:"人类基因组学的重要里程碑，T2T完整参考基因组将改变精准医学、遗传病诊断和种群遗传学研究的基础，为理解基因组结构变异与疾病的关联提供了完整参考序列。", paperUrl:"https://www.science.org/doi/10.1126/science.abj6987", tags:["三代测序","基因组组装","T2T"], venue:"Science 2022" },
    { year:2023, month:6, title:"Geneformer: Foundation Model for Single-Cell Omics", authors:"Theodoris C et al.", focus:"单细胞多组学基础模型", citations:4200, abstract:"提出Geneformer单细胞转录组基础模型，在零样本和少样本场景下实现跨组织基因调控网络推断。", coreArgument:"在2900万个单细胞转录组数据上预训练Geneformer模型，学习基因调控层次（枢纽基因的注意力权重）和细胞状态表示，在零样本场景下预测心脏病相关基因调控网络扰动，准确率超过实验验证的计算方法。", role:"生命科学基础模型的代表性工作，Geneformer、scGPT等单细胞AI模型预示着生物学研究将进入通用基础模型时代，对疾病机制解析和药物靶点发现有重要价值。", paperUrl:"https://www.nature.com/articles/s41586-023-06139-9", tags:["基础模型","单细胞","基因调控"], venue:"Nature 2023" },
    { year:2024, month:4, title:"Spatial Transcriptomics: Decoding Tissue Architecture", authors:"Ståhl P et al.", focus:"空间转录组学解析组织架构", citations:8800, abstract:"综述空间转录组学技术及其在肿瘤微环境、发育生物学和神经科学中的最新应用。", coreArgument:"将组织切片直接放置于含有空间条形码的捕获阵列上，扩增转录本后测序，在保留组织空间背景的前提下获得全基因组表达图谱，首次在肿瘤微环境中揭示了细胞类型分布与相互作用的空间规律。", role:"空间组学技术的重要进展，10X Visium等商业平台被广泛应用于肿瘤微环境研究、脑组织图谱和胚胎发育研究，空间转录组学已成为发育生物学和肿瘤学的标准研究工具。", paperUrl:"https://www.science.org/doi/10.1126/science.aaf2403", tags:["空间转录组","基因表达","组织图谱"], venue:"Science 2016" },

  "CRISPR基因编辑": makePapers("CRISPR基因编辑", [
    { year:2016, month:3, title:"CRISPR-Cas9 for Medical Genetic Disorders", authors:"Doudna J, Charpentier E et al.", focus:"CRISPR-Cas9医学遗传疾病治疗", citations:18000, abstract:"综述CRISPR-Cas9在治疗镰刀型细胞病、beta-地中海贫血等遗传性血液疾病中的临床前进展。", coreArgument:"系统阐述利用CRISPR-Cas9在造血干细胞中修正致病基因突变的临床前策略，包括体外编辑后回输（ex vivo）和体内靶向递送（in vivo）两条路径，并评估脱靶效应和免疫原性风险。", role:"CRISPR从基础工具走向临床应用的关键综述，为后续镰刀型细胞病和beta-地中海贫血的CRISPR疗法临床试验奠定了科学基础，Doudna和Charpentier因此获2020年诺贝尔化学奖。", paperUrl:"https://www.science.org/doi/10.1126/science.aad4392", tags:["CRISPR","基因治疗","遗传病"], venue:"Science 2016" },
    { year:2017, month:4, title:"Base Editing: Precise Genome Editing", authors:"Komor A et al.", focus:"碱基编辑精准基因组修改", citations:12000, abstract:"开发碱基编辑器，在不产生双链断裂的情况下精准转换单个DNA碱基，大幅降低脱靶风险。", coreArgument:"将失去催化活性的Cas9（dCas9或nCas9）与脱氨酶融合，在不切割DNA双链的情况下直接将C·G碱基对转换为T·A（CBE）或A·T转换为G·C（ABE），避免了双链断裂引起的插入缺失突变和染色体重排。", role:"CRISPR工具箱的重大扩展，碱基编辑将基因组编辑的精度从基因层面提升到单碱基层面，为治疗约50%的已知致病点突变提供了全新工具，是David Liu实验室的代表作。", paperUrl:"https://www.nature.com/articles/nature17544", tags:["碱基编辑","点突变","精准编辑"], venue:"Nature 2016" },

function makePapers(keyword, arr) {
  return arr.map((p, i) => ({ id: `${keyword}_${i}`, keyword, ...p }));
}

// 猫爪颜色方案（白粉毛绒系，肉垫渐变）

// ══════════════════════════════════════════════
//  Three.js 初始化
// ══════════════════════════════════════════════
function initThree() {
  const canvas = document.getElementById('three-canvas');
  const container = document.getElementById('canvas-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xfdf6f0);  // 浅奶白
  scene.fog = new THREE.FogExp2(0xfdf6f0, 0.008);

  camera = new THREE.PerspectiveCamera(58, W / H, 0.1, 800);
  camera.position.set(0, 22, 65);

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.shadowMap.enabled = true;

  // OrbitControls
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 8;
  controls.maxDistance = 200;

  // 灯光 — 暖色调
  const ambLight = new THREE.AmbientLight(0xfff0f8, 1.1);
  scene.add(ambLight);

  const dirLight = new THREE.DirectionalLight(0xffdde8, 1.4);
  dirLight.position.set(20, 40, 30);
  dirLight.castShadow = true;
  scene.add(dirLight);

  const fillLight = new THREE.DirectionalLight(0xf0e0ff, 0.5);
  fillLight.position.set(-20, 10, -20);
  scene.add(fillLight);

  // 漂浮小圆点背景
  addFloatingDots();

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('click', onCanvasClick);
  window.addEventListener('resize', onResize);

  animate();
}

function addFloatingDots() {
  // 散落的淡粉色小圆点装饰
  const geo = new THREE.BufferGeometry();
  const count = 800;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i*3]   = (Math.random() - 0.5) * 300;
    pos[i*3+1] = (Math.random() - 0.5) * 300;
    pos[i*3+2] = (Math.random() - 0.5) * 300;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color: 0xf9c0d8, size: 0.35, transparent: true, opacity: 0.45 });
  scene.add(new THREE.Points(geo, mat));
}

// ══════════════════════════════════════════════
//  构建图谱
// ══════════════════════════════════════════════
function buildGraph(papers) {
  clearGraph();
  if (!papers.length) return;

  const yearMin = Math.min(...papers.map(p => p.year));
  const yearMax = Math.max(...papers.map(p => p.year));
  const yearRange = yearMax - yearMin || 1;

  const positions = computeNodePositions(papers, yearMin, yearRange);

  papers.forEach((paper, i) => {
    const pos = positions[i];
    const t = (paper.year - yearMin) / yearRange;
    const colorIdx = Math.min(Math.floor(t * PAW_COLORS.length), PAW_COLORS.length - 1);
    const col = PAW_COLORS[colorIdx];

    // 节点大小按引用数（缩小尺寸）
    const citLog = Math.log10(Math.max(paper.citations, 200));
    const scale = 0.32 + citLog * 0.10;

    // 创建猫爪
    const group = createPawGroup(scale, col.main, col.emi);
    group.position.set(pos.x, pos.y, pos.z);
    group.rotation.z = (Math.random() - 0.5) * 0.4;  // 略微随机旋转
    group.userData.paper = paper;
    group.userData.index = i;
    group.userData.scale = scale;
    scene.add(group);

    // 年份标签（CSS2D）
    const label = createYearLabel(paper);
    nodeObjects.push({ group, paper, label });
  });

  // 绘制连线
  buildEdges(papers, positions);

  // 统计
  document.getElementById('stat-count').textContent = papers.length;
  document.getElementById('stat-edges').textContent = edgeObjects.length;
  document.getElementById('stat-span').textContent = yearMin + '–' + yearMax;
  document.getElementById('stat-kw').textContent = papers[0]?.keyword || '—';

  buildTimeline(papers, yearMin, yearMax);
  buildPaperList(papers);
  focusCameraOnGraph(positions);
}

function computeNodePositions(papers, yearMin, yearRange) {
  const positions = papers.map((paper, i) => {
    const t = (paper.year - yearMin) / yearRange;
    const angle = t * Math.PI * 4.5 + i * 0.38;
    const r = 16 + Math.sin(i * 0.6) * 7;
    return {
      x: Math.cos(angle) * r + (Math.random() - 0.5) * 4,
      y: (t - 0.5) * 32 + (Math.random() - 0.5) * 5,
      z: Math.sin(angle) * r + (Math.random() - 0.5) * 4,
    };
  });

  // 简单排斥力防重叠
  for (let iter = 0; iter < 60; iter++) {
    for (let i = 0; i < positions.length; i++) {
      for (let j = i + 1; j < positions.length; j++) {
        const dx = positions[i].x - positions[j].x;
        const dy = positions[i].y - positions[j].y;
        const dz = positions[i].z - positions[j].z;
        const d = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.001;
        const min = 4.2;
        if (d < min) {
          const f = (min - d) / d * 0.25;
          positions[i].x += dx * f; positions[j].x -= dx * f;
          positions[i].y += dy * f * 0.25; positions[j].y -= dy * f * 0.25;
          positions[i].z += dz * f; positions[j].z -= dz * f;
        }
      }
    }
  }
  return positions;
}

function buildEdges(papers, positions) {
  for (let i = 0; i < papers.length; i++) {
    for (let j = i + 1; j < papers.length; j++) {
      const pi = papers[i], pj = papers[j];
      const yearDiff = Math.abs(pi.year - pj.year);
      const sharedTags = pi.tags.filter(t => pj.tags.includes(t)).length;
      if (yearDiff > 3) continue;
      if (yearDiff > 1 && sharedTags === 0 && Math.random() > 0.12) continue;

      const startV = new THREE.Vector3(positions[i].x, positions[i].y, positions[i].z);
      const endV   = new THREE.Vector3(positions[j].x, positions[j].y, positions[j].z);
      const [from, to] = pi.year <= pj.year ? [startV, endV] : [endV, startV];

      const mid = new THREE.Vector3().lerpVectors(from, to, 0.5);
      mid.y += 1.5 + Math.random() * 2.5;
      const curve = new THREE.QuadraticBezierCurve3(from, mid, to);
      const pts = curve.getPoints(28);
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const strength = sharedTags > 0 ? 0.4 : 0.18;
      const mat = new THREE.LineBasicMaterial({ color: 0xf4a0c8, transparent: true, opacity: strength });
      const line = new THREE.Line(geo, mat);
      scene.add(line);
      edgeObjects.push(line);

      // 箭头
      const dir = new THREE.Vector3().subVectors(to, from).normalize();
      const arrow = new THREE.ArrowHelper(
        dir,
        new THREE.Vector3().lerpVectors(from, to, 0.68),
        from.distanceTo(to) * 0.2,
        0xf472b6, 0.65, 0.3
      );
      arrow.line.material.transparent = true;
      arrow.line.material.opacity = 0.4;
      scene.add(arrow);
      edgeObjects.push(arrow);
    }
  }
}

function createYearLabel(paper) {
  const div = document.createElement('div');
  div.className = 'node-label';
  div.innerHTML = `<span class="lbl-year">${paper.year}.${String(paper.month || 1).padStart(2,'0')}</span>`;
  document.body.appendChild(div);
  return div;
}

function clearGraph() {
  nodeObjects.forEach(({ group, label }) => {
    scene.remove(group);
    if (label?.parentNode) label.parentNode.removeChild(label);
  });
  edgeObjects.forEach(o => scene.remove(o));
  nodeObjects = [];
  edgeObjects = [];
  selectedNode = null;
  hoveredNode = null;
}

// ══════════════════════════════════════════════
//  时间轴 & 列表
// ══════════════════════════════════════════════
function buildTimeline(papers, yearMin, yearMax) {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  const all = document.createElement('span');
  all.className = 'tl-year active';
  all.textContent = '全部';
  all.onclick = () => filterByYear('全部');
  tl.appendChild(all);

  for (let y = yearMin; y <= yearMax; y++) {
    if (!papers.some(p => p.year === y)) continue;
    const s = document.createElement('span');
    s.className = 'tl-year';
    s.textContent = y;
    s.onclick = () => filterByYear(y);
    tl.appendChild(s);
  }
  activeYear = '全部';
}

function filterByYear(year) {
  activeYear = year;
  document.querySelectorAll('.tl-year').forEach(el =>
    el.classList.toggle('active', String(el.textContent) === String(year)));
  nodeObjects.forEach(({ group, paper }) => {
    const vis = year === '全部' || paper.year == year;
    group.visible = vis;
    group.traverse(c => { if (c.material) c.material.opacity = vis ? 1 : 0.05; });
  });
  edgeObjects.forEach(o => {
    if (o.material) o.material.opacity = year === '全部' ? undefined : 0.04;
  });
}

function buildPaperList(papers) {
  const container = document.getElementById('paper-items');
  container.innerHTML = '';
  document.getElementById('list-header').textContent = `🐾 论文列表 · ${papers.length} 篇`;
  [...papers].sort((a, b) => a.year - b.year).forEach(paper => {
    const div = document.createElement('div');
    div.className = 'paper-item';
    div.dataset.id = paper.id;
    div.innerHTML = `<div class="year">${paper.year}.${String(paper.month||1).padStart(2,'0')} · ${paper.venue||''}</div><div class="title">${paper.title}</div>`;
    div.onclick = () => { focusOnPaper(paper); showDetail(paper); };
    container.appendChild(div);
  });
}

// ══════════════════════════════════════════════
//  相机 & 聚焦
// ══════════════════════════════════════════════
function focusCameraOnGraph(positions) {
  if (!positions.length) return;
  const cx = positions.reduce((s, p) => s + p.x, 0) / positions.length;
  const cy = positions.reduce((s, p) => s + p.y, 0) / positions.length;
  const cz = positions.reduce((s, p) => s + p.z, 0) / positions.length;
  controls.target.set(cx, cy, cz);
  camera.position.set(cx, cy + 22, cz + 62);
  controls.update();
}

function focusOnPaper(paper) {
  const obj = nodeObjects.find(n => n.paper.id === paper.id);
  if (!obj) return;
  const p = obj.group.position;
  const dur = 750, start = performance.now();
  const sp = camera.position.clone(), st = controls.target.clone();
  const ep = new THREE.Vector3(p.x + 4, p.y + 6, p.z + 16);

  const anim = (now) => {
    const t = Math.min((now - start) / dur, 1);
    const e = 1 - Math.pow(1 - t, 3);
    camera.position.lerpVectors(sp, ep, e);
    controls.target.lerpVectors(st, p, e);
    controls.update();
    if (t < 1) requestAnimationFrame(anim);
  };
  requestAnimationFrame(anim);

  // 高亮
  nodeObjects.forEach(n => {
    const isSel = n.paper.id === paper.id;
    n.group.scale.setScalar(isSel ? 2.0 : 0.85);
  });
  selectedNode = obj;

  document.querySelectorAll('.paper-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === paper.id));
}

function resetCamera() {
  if (!nodeObjects.length) return;
  const positions = nodeObjects.map(n => ({ x: n.group.position.x, y: n.group.position.y, z: n.group.position.z }));
  focusCameraOnGraph(positions);
  nodeObjects.forEach(n => n.group.scale.setScalar(1));
  selectedNode = null;
  closeDetail();
}

function toggleAutoRotate() {
  autoRotate = !autoRotate;
  document.getElementById('autoRotateBtn').classList.toggle('active', autoRotate);
}

function zoomIn()  { camera.fov = Math.max(camera.fov - 5, 20); camera.updateProjectionMatrix(); }
function zoomOut() { camera.fov = Math.min(camera.fov + 5, 100); camera.updateProjectionMatrix(); }

function toggleLayout() {
  layoutMode = layoutMode === '3d' ? 'flat' : '3d';
  document.getElementById('layoutBtn').classList.toggle('active', layoutMode === 'flat');
  if (!nodeObjects.length) return;
  const yearMin = Math.min(...nodeObjects.map(n => n.paper.year));
  const yearRange = Math.max(...nodeObjects.map(n => n.paper.year)) - yearMin || 1;
  nodeObjects.forEach((n, i) => {
    const t = (n.paper.year - yearMin) / yearRange;
    const angle = t * Math.PI * 4.5 + i * 0.38;
    const r = 18 + (i % 4) * 4;
    if (layoutMode === 'flat') {
      n.group.position.set(Math.cos(angle) * r, (t - 0.5) * 2, Math.sin(angle) * r);
    } else {
      n.group.position.set(Math.cos(angle) * r, (t - 0.5) * 32, Math.sin(angle) * r);
    }
  });
}

// ══════════════════════════════════════════════
//  鼠标交互
// ══════════════════════════════════════════════
function onMouseMove(event) {
  const container = document.getElementById('canvas-container');
  const rect = container.getBoundingClientRect();
  mouse.x =  ((event.clientX - rect.left) / rect.width)  * 2 - 1;
  mouse.y = -((event.clientY - rect.top)  / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  // 拾取所有猫爪子网格
  const meshes = [];
  nodeObjects.forEach(n => n.group.traverse(c => { if (c.isMesh) meshes.push(c); }));
  const hits = raycaster.intersectObjects(meshes);

  if (hits.length > 0) {
    // 找到对应的 group
    let hitGroup = hits[0].object;
    while (hitGroup.parent && !hitGroup.userData.paper) hitGroup = hitGroup.parent;
    const obj = nodeObjects.find(n => n.group === hitGroup);

    if (obj && obj !== hoveredNode) {
      if (hoveredNode && hoveredNode !== selectedNode) {
        hoveredNode.group.scale.setScalar(1);
      }
      hoveredNode = obj;
      if (obj !== selectedNode) obj.group.scale.setScalar(1.45);
      document.body.style.cursor = 'pointer';
      showTooltip(event, obj.paper);
    } else if (hoveredNode) {
      moveTooltip(event);
    }
  } else {
    if (hoveredNode && hoveredNode !== selectedNode) {
      hoveredNode.group.scale.setScalar(1);
    }
    hoveredNode = null;
    document.body.style.cursor = 'default';
    hideTooltip();
  }
}

function onCanvasClick() {
  if (!hoveredNode) return;
  focusOnPaper(hoveredNode.paper);
  showDetail(hoveredNode.paper);
}

function showTooltip(event, paper) {
  document.getElementById('tt-year').textContent = `🐾 ${paper.year}.${String(paper.month||1).padStart(2,'0')} · ${paper.venue||''}`;
  document.getElementById('tt-title').textContent = paper.title.length > 55 ? paper.title.substring(0,55)+'…' : paper.title;
  document.getElementById('tt-focus').textContent = '📌 ' + paper.focus;
  const tip = document.getElementById('tooltip');
  tip.classList.add('show');
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top  = (event.clientY - 10) + 'px';
}
function moveTooltip(event) {
  const tip = document.getElementById('tooltip');
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top  = (event.clientY - 10) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }

// ══════════════════════════════════════════════
//  详情面板
// ══════════════════════════════════════════════
function showDetail(paper) {
  document.getElementById('dp-year').textContent = `🐾 ${paper.year}.${String(paper.month||1).padStart(2,'0')} · ${paper.venue||''}`;
  document.getElementById('dp-title').textContent = paper.title;
  document.getElementById('dp-authors').textContent = '✍️ ' + paper.authors;
  document.getElementById('dp-abstract').textContent = paper.abstract;
  document.getElementById('dp-citations').textContent = `📊 被引用 ${paper.citations.toLocaleString()} 次`;
  document.getElementById('dp-tags').innerHTML = paper.tags.map(t=>`<span class="dp-tag">${t}</span>`).join('');

  // ── 原文地址（可点击跳转）──
  const url = paper.paperUrl || `https://scholar.google.com/scholar?q=${encodeURIComponent(paper.title)}`;
  document.getElementById('dp-url').innerHTML = `<a href="${url}" target="_blank" style="color:#c084fc;text-decoration:none;word-break:break-all;">${url.replace(/https?:\/\//,'')}</a>`;

  // ── 核心论点 ──
  document.getElementById('dp-core').textContent = paper.coreArgument || '暂无核心论点描述。';

  // ── 领域地位 & 逻辑关系 ──
  document.getElementById('dp-role').innerHTML = paper.role || '暂无领域地位分析。';
  // 自动推断逻辑关系
  const prev = currentPapers.filter(p => p.year < paper.year);
  const next = currentPapers.filter(p => p.year > paper.year);
  const sameYear = currentPapers.filter(p => p.year === paper.year && p.id !== paper.id);
  let logicHTML = '';
  if (prev.length) {
    const names = prev.slice(-2).map(p => `<span style="color:#c084fc;cursor:pointer;" onclick="focusOnPaper(window._pm['${p.id}']);showDetail(window._pm['${p.id}'])">${p.year}《${p.title.length>20?p.title.slice(0,20)+'…':p.title}》</span>`).join('、');
    logicHTML += `📌 前期基础：${names}<br>`;
  }
  if (sameYear.length) {
    const names = sameYear.map(p => `<span style="color:#f48cb8;cursor:pointer;" onclick="focusOnPaper(window._pm['${p.id}']);showDetail(window._pm['${p.id}'])">${p.title.length>18?p.title.slice(0,18)+'…':p.title}</span>`).join('、');
    logicHTML += `🤝 同期相关：${names}<br>`;
  }
  if (next.length) {
    const names = next.slice(0,2).map(p => `<span style="color:#82c0ff;cursor:pointer;" onclick="focusOnPaper(window._pm['${p.id}']);showDetail(window._pm['${p.id}'])">${p.year}《${p.title.length>20?p.title.slice(0,20)+'…':p.title}》</span>`).join('、');
    logicHTML += `🚀 后续发展：${names}`;
  }
  document.getElementById('dp-logic').innerHTML = logicHTML || '暂无相关逻辑关系信息。';

  // ── 外部链接 ──
  document.getElementById('dp-links').innerHTML = `
    <a href="https://scholar.google.com/scholar?q=${encodeURIComponent(paper.title)}" target="_blank">Google Scholar</a>
    <a href="https://arxiv.org/search/?query=${encodeURIComponent(paper.title)}&searchtype=all" target="_blank">arXiv</a>
    <a href="https://www.semanticscholar.org/search?q=${encodeURIComponent(paper.title)}&sort=Relevance" target="_blank">Semantic Scholar</a>
  `;

  // ── 相关文献列表 ──
  const related = currentPapers.filter(p => p.id !== paper.id && p.tags.some(t => paper.tags.includes(t))).slice(0, 4);
  document.getElementById('dp-related').innerHTML = related.map(p => `
    <div style="padding:6px 0;border-bottom:1px solid rgba(249,168,212,0.1);cursor:pointer;"
      onclick="focusOnPaper(window._pm['${p.id}']);showDetail(window._pm['${p.id}'])">
      <span style="font-size:11px;color:#c084fc;">${p.year}</span>
      <span style="font-size:12px;color:#9a6080;margin-left:5px;">${p.title.length>44?p.title.substring(0,44)+'…':p.title}</span>
    </div>
  `).join('') || '<span style="font-size:12px;color:#d0b0c0;">暂无直接相关文献</span>';

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  if (selectedNode) { selectedNode.group.scale.setScalar(1); selectedNode = null; }
  nodeObjects.forEach(n => n.group.scale.setScalar(1));
}

  /^(股票|炒股|基金|理财|投资|K线|涨停|跌停|行情|个股|ETF|大盘|指数|A股|港股|美股|沪深|创业板|科创板)/,

  /^(历史|政治|法律|新闻|资讯|事件|热点)/,
  // 明显无意义或极短词
  /^.{1}$/,
];

/**
 * 检测关键词是否属于已定义的科研领域
 * 返回匹配的数据库key，或null
 */
function matchDomain(kw) {
  const lower = kw.toLowerCase().replace(/\s+/g,'');
  // 直接匹配数据库key
  if (PAPER_DB[kw]) return kw;
  // 别名匹配
  for (const [domain, aliases] of Object.entries(DOMAIN_ALIASES)) {
    if (aliases.some(alias => lower.includes(alias.replace(/\s+/g,'')) || alias.replace(/\s+/g,'').includes(lower))) {
      return domain;
    }
  }
  // 数据库key子串匹配
  for (const key of Object.keys(PAPER_DB)) {
    if (key.includes(kw) || kw.includes(key)) return key;
  }
  return null;
}

/**
 * 是否明确是非科研词汇
 */
function isNonAcademic(kw) {
  return NON_ACADEMIC_PATTERNS.some(re => re.test(kw.trim()));
}

    <div style="font-size:18px;font-weight:800;color:#c060a0;margin-bottom:8px;">抱歉，无相关内容</div>
    <div style="font-size:13.5px;color:#a07090;line-height:1.7;max-width:260px;margin:0 auto;">
      「<span style="color:#e060a0;font-weight:600;">${keyword}</span>」暂不在科研图谱覆盖范围内<br>
      请尝试以下方向：
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:14px 0 0;">
      ${Object.keys(PAPER_DB).map(k=>`<span onclick="document.getElementById('no-result-toast').remove();quickSearch('${k}')" style="background:rgba(249,168,212,0.18);border:1px solid rgba(249,168,212,0.5);border-radius:14px;font-size:12px;padding:5px 14px;cursor:pointer;color:#c060a0;transition:background 0.2s;" onmouseover="this.style.background='rgba(249,168,212,0.35)'" onmouseout="this.style.background='rgba(249,168,212,0.18)'">${k}</span>`).join('')}
    </div>
    <button onclick="this.parentElement.remove()" style="margin-top:18px;background:linear-gradient(135deg,#f9a8d4,#c084fc);border:none;border-radius:16px;color:#fff;font-size:13px;padding:8px 26px;cursor:pointer;font-weight:600;letter-spacing:0.5px;">知道啦 🐾</button>
  `;
  document.body.appendChild(toast);

  // 5秒后自动消失
  setTimeout(() => { if (toast.parentNode) toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 400); }, 5000);
}

// ══════════════════════════════════════════════
//  搜索
// ══════════════════════════════════════════════
function doSearch(keyword) {
  if (!keyword.trim()) return;
  currentKeyword = keyword.trim();

  // 1. 先检测是否明显是非科研词汇
  if (isNonAcademic(currentKeyword)) {
    showNoResultToast(currentKeyword);
    return;
  }

  // 2. 尝试科研领域匹配
  const domainKey = matchDomain(currentKeyword);

  if (domainKey) {
    // 匹配到科研领域，加载对应数据
    const papers = PAPER_DB[domainKey].map(p => ({...p, keyword: currentKeyword}));
    currentPapers = papers;
    window._pm = {};
    papers.forEach(p => window._pm[p.id] = p);
    showLoading(`🐾 正在构建「${domainKey}」科研图谱~`);
    setTimeout(() => { buildGraph(papers); hideLoading(); if (!listOpen) toggleList(); }, 900);
  } else {
    // 未匹配到任何科研领域 → 显示无结果提示
    showNoResultToast(currentKeyword);
  }
}

function genRandom(keyword) {
  const focuses = ['基础理论构建','方法论创新','性能突破','跨领域应用','综述与展望','临床验证','工程落地','标准与评测'];
  const venues  = ['Nature','Science','CVPR','NeurIPS','ICML','ACL','AAAI','arXiv'];
  const papers  = [];
  for (let y = 2016; y <= 2025; y++) {
    const n = y >= 2020 ? 3 : 2;
    for (let j = 0; j < n; j++) {
      const m = 1 + Math.floor(Math.random() * 12);
      papers.push({
        id: `${keyword}_r_${y}_${j}`, keyword, year: y, month: m,
        title: `${keyword}: ${focuses[(y+j)%focuses.length]} (${y})`,
        authors: 'Author A, Author B et al.',
        focus: focuses[(y+j)%focuses.length],
        citations: Math.floor(Math.random() * 10000) + 300,
        abstract: `本文针对${keyword}领域进行深入研究，提出了创新性方法，在${y}年取得重要进展。`,
        coreArgument: `本文在${keyword}领域提出了${focuses[(y+j)%focuses.length]}方向的核心贡献，通过系统性实验验证了方法的有效性。`,
        role: `本文是${keyword}领域${y}年的代表性工作之一，对该领域的${focuses[(y+j)%focuses.length]}方向产生了重要推动作用。`,
        paperUrl: `https://scholar.google.com/scholar?q=${encodeURIComponent(keyword+' '+y)}`,
        tags: [keyword, focuses[j%focuses.length]],
        venue: `${venues[(y+j)%venues.length]} ${y}`,
      });
    }
  }
  return papers;
}

function quickSearch(kw) {
  document.getElementById('searchInput').value = kw;
  doSearch(kw);
}

function showLoading(text) {
  const el = document.getElementById('loading');
  el.querySelector('.loading-text').textContent = text || '加载中...';
  el.classList.remove('hidden');
}
function hideLoading() {
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 200);
}

function toggleList() {
  listOpen = !listOpen;
  document.getElementById('paper-list').classList.toggle('open', listOpen);
  const btn = document.getElementById('toggle-list');
  btn.classList.toggle('closed', !listOpen);
  btn.style.left = listOpen ? '300px' : '10px';
}

// ══════════════════════════════════════════════
//  动画循环
// ══════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);

  controls.autoRotate = autoRotate;
  controls.autoRotateSpeed = 0.45;
  controls.update();

  const t = Date.now() * 0.001;

  // 猫爪轻微浮动 & 摇摆
  nodeObjects.forEach((n, i) => {
    if (n.group === selectedNode?.group) return;
    const scale = n.paper && n.group.userData.scale ? n.group.userData.scale : 0.8;
    const hovering = n === hoveredNode;
    if (!hovering) {
      n.group.position.y += Math.sin(t * 1.1 + i * 0.7) * 0.003;  // 轻微上下浮动
      n.group.rotation.z  = Math.sin(t * 0.6 + i * 0.4) * 0.08;   // 轻微摇摆
    }
  });

  // 标签跟随
  nodeObjects.forEach(n => {
    if (!n.label) return;
    const pos = n.group.position.clone().project(camera);
    const container = document.getElementById('canvas-container').getBoundingClientRect();
    const sx = container.left + (pos.x * 0.5 + 0.5) * renderer.domElement.clientWidth;
    const sy = container.top  + (1 - (pos.y * 0.5 + 0.5)) * renderer.domElement.clientHeight;
    const distFactor = camera.position.distanceTo(n.group.position);
    const offsetY = Math.max(12, 70 / distFactor * 22);
    n.label.style.left = (sx - 28) + 'px';
    n.label.style.top  = (sy + offsetY) + 'px';
    n.label.style.opacity = pos.z < 1 ? '1' : '0';

    const isSel = selectedNode && selectedNode.group === n.group;
    const isHov = n === hoveredNode;
    n.label.querySelector('.lbl-year').style.background = (isSel || isHov)
      ? 'rgba(249,168,212,0.5)' : 'rgba(255,240,248,0.92)';
    n.label.querySelector('.lbl-year').style.color = (isSel || isHov) ? '#8020a0' : '#c060a0';
  });

  renderer.render(scene, camera);
}

function onResize() {
  const c = document.getElementById('canvas-container');
  camera.aspect = c.clientWidth / c.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(c.clientWidth, c.clientHeight);
}

// ══════════════════════════════════════════════
//  启动
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initThree();
  document.getElementById('searchBtn').onclick = () => doSearch(document.getElementById('searchInput').value);
  document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(e.target.value); });
  setTimeout(() => { hideLoading(); quickSearch('深度学习'); }, 700);
});
</script>
